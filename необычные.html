<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Сборник Калькуляторов - Разное</title>
<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#e91e63,#ad1457);
    color:white;
    text-align:center;
    min-height:100vh
}
.menu{margin-top:20px}

button{
    padding:12px;
    margin:5px;
    border:none;
    border-radius:14px;
    background:white;
    color:#e91e63;
    font-size:14px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s
}
button:hover{transform:scale(1.08);box-shadow:0 0 15px white}
button:active{transform:scale(0.9)}

.box{
    display:none;
    background:rgba(255,255,255,0.1);
    margin:20px auto;
    padding:25px;
    border-radius:20px;
    width:420px;
    animation:fade 0.3s;
    border: 1px solid rgba(255,255,255,0.25)
}
@keyframes fade{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1}
}

input, select{
    width:85%;
    padding:10px;
    margin:5px 0;
    font-size:16px;
    border:none;
    border-radius:10px;
    text-align:center;
    outline:none
}

.res-container{
    margin-top:20px;
    background:rgba(0,0,0,0.35);
    padding:18px;
    border-radius:15px
}

#out, #fout, #hout{
    font-size:21px;
    font-weight:bold;
    color:#fff
}

.exp{
    font-size:13px;
    color:#ffe4f0;
    margin-top:6px;
    font-style:italic
}

.sub{margin-top:10px; padding-top:10px}
h3{font-size:16px; margin:18px 0 10px 0; color:#fff}
.mini-btn{padding:8px; font-size:12px; background:#fff; color:#e91e63}
</style>
</head>
<body>

<h1>Разное</h1>

<div class="menu">
    <button onclick="show('conv')">Конвертеры</button>
    <button onclick="show('finance')">Финансы</button>
    <button onclick="show('health')">Здоровье</button>
    <button onclick="show('gameMenu')">Тренажёр</button>
</div>

<div id="conv" class="box">
    <div style="display:flex; flex-wrap:wrap; justify-content:center">
        <button class="mini-btn" onclick="showSub('c1')">Валюта</button>
        <button class="mini-btn" onclick="showSub('c2')">Единицы</button>
        <button class="mini-btn" onclick="showSub('c3')">Температура</button>
    </div>

    <div id="c1" class="sub">
        <h3>Конвертер валют</h3>
        <input id="amount" placeholder="Сумма" value="100">
        <select id="from" style="width:40%;padding:10px;margin:5px">
            <option value="RUB">RUB</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
        </select>
        →
        <select id="to" style="width:40%;padding:10px;margin:5px">
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="RUB">RUB</option>
        </select>
        <button onclick="convertCurrency()">Конвертировать</button>
    </div>

    <div id="c2" class="sub" style="display:none">
        <h3>Единицы измерения</h3>
        <input id="val1" placeholder="Значение" value="100">
        <select id="unitFrom" style="width:40%">
            <option value="km">км</option><option value="m">м</option><option value="cm">см</option>
            <option value="kg">кг</option><option value="g">г</option>
        </select>
        →
        <select id="unitTo" style="width:40%">
            <option value="m">м</option><option value="km">км</option><option value="cm">см</option>
            <option value="g">г</option><option value="kg">кг</option>
        </select>
        <button onclick="convertUnits()">Перевести</button>
    </div>

    <div id="c3" class="sub" style="display:none">
        <h3>Температура</h3>
        <input id="temp" placeholder="Температура" value="25">
        <select id="tempFrom">
            <option value="C">°C</option>
            <option value="F">°F</option>
            <option value="K">K</option>
        </select>
        →
        <select id="tempTo">
            <option value="F">°F</option>
            <option value="C">°C</option>
            <option value="K">K</option>
        </select>
        <button onclick="convertTemp()">Перевести</button>
    </div>

    <div class="res-container">
        <div id="out">...</div>
        <div id="explain" class="exp">Результат</div>
    </div>
</div>

<div id="finance" class="box">
    <div class="sub">
        <h3>Кредит (ежемесячный платёж)</h3>
        <input id="loan" placeholder="Сумма кредита" value="500000">
        <input id="rate" placeholder="Годовая ставка (%)" value="12">
        <input id="months" placeholder="Срок (месяцев)" value="36">
        <button onclick="calcLoan()">Рассчитать платёж</button>

        <h3 style="margin-top:25px">Доход по вкладу</h3>
        <input id="sum" placeholder="Сумма" value="100000">
        <input id="prate" placeholder="Ставка (%)" value="8">
        <input id="ptime" placeholder="Срок (лет)" value="3">
        <button onclick="calcIncome()">Рассчитать доход</button>
    </div>

    <div class="res-container">
        <div id="fout">...</div>
        <div id="fexp" class="exp">Результат появится здесь</div>
    </div>
</div>

<div id="health" class="box">
    <div class="sub">
        <h3>Индекс массы тела (BMI)</h3>
        <input id="weight" placeholder="Вес (кг)" value="70">
        <input id="height" placeholder="Рост (см)" value="175">
        <button onclick="calcBMI()">Рассчитать BMI</button>

        <h3 style="margin-top:25px">Калькулятор воды</h3>
        <input id="wweight" placeholder="Вес (кг)" value="70">
        <button onclick="calcWater()">Сколько пить воды</button>
    </div>

    <div class="res-container">
        <div id="hout">...</div>
        <div id="hexp" class="exp">Результат появится здесь</div>
    </div>
</div>

<div id="gameMenu" class="box">
    <h2>Что будем решать?</h2>
    <button onclick="gType='currency'">Валюта</button>
    <button onclick="gType='temp'">Температура</button>
    <button onclick="gType='finance'">Финансы</button>
    <button onclick="gType='health'">Здоровье</button>
    <button onclick="gType='mix'">Смешанный</button>
    
    <h3>Режим</h3>
    <button onclick="gMode='norm'">Обычный</button>
    <button onclick="gMode='time'">На время (30 сек)</button>
    
    <br><br>
    <button onclick="startGame()" style="width:100%; background:#e91e63; color:white; font-size:18px">НАЧАТЬ ТРЕНИРОВКУ</button>
</div>

<div id="game" class="box">
    <div id="timer" style="font-size:20px; color:yellow"></div>
    <p id="q" style="font-size:26px; font-weight:bold"></p>
    <input id="ans" type="number" placeholder="Ответ">
    <button onclick="checkGame()" style="width:100%">ПРОВЕРИТЬ</button>
    <p>Очки: <span id="score">0</span></p>
    <div id="gameHint" class="exp"></div>
    <button onclick="show('gameMenu')" style="background:none; color:white; border:1px solid white; margin-top:10px">Выйти</button>
</div>

<script>
function show(id){
    document.querySelectorAll(".box").forEach(x=>x.style.display="none");
    document.getElementById(id).style.display="block";
    
    if(id === 'finance' || id === 'health'){
        setTimeout(() => {
            const sub = document.querySelector(`#${id} .sub`);
            if(sub) sub.style.display = "block";
        }, 10);
    }
}

function showSub(id){
    document.querySelectorAll(".sub").forEach(x=>x.style.display="none");
    const el = document.getElementById(id);
    if(el) el.style.display="block";
}

const rates = { RUB: 1, USD: 0.0098, EUR: 0.0091 };

function convertCurrency(){
    let amount = parseFloat(document.getElementById('amount').value) || 0;
    let from = document.getElementById('from').value;
    let to = document.getElementById('to').value;
    let result = (amount * rates[from] / rates[to]).toFixed(2);
    document.getElementById('out').innerHTML = result + " " + to;
    document.getElementById('explain').innerHTML = `${from} → ${to}`;
}

function convertUnits(){
    let val = parseFloat(document.getElementById('val1').value) || 0;
    let from = document.getElementById('unitFrom').value;
    let to = document.getElementById('unitTo').value;
    let base = val;
    if(from==="km") base*=1000; 
    if(from==="cm") base/=100; 
    if(from==="g") base/=1000;
    
    let result = base;
    if(to==="km") result/=1000; 
    if(to==="cm") result*=100; 
    if(to==="g") result*=1000;
    
    document.getElementById('out').innerHTML = result.toFixed(4) + " " + to;
    document.getElementById('explain').innerHTML = "Конвертация единиц";
}

function convertTemp(){
    let t = parseFloat(document.getElementById('temp').value) || 0;
    let from = document.getElementById('tempFrom').value;
    let to = document.getElementById('tempTo').value;
    let c = t;
    if(from==="F") c = (t-32)*5/9;
    if(from==="K") c = t-273.15;
    let res = c;
    if(to==="F") res = c*9/5+32;
    if(to==="K") res = c+273.15;
    document.getElementById('out').innerHTML = res.toFixed(2) + " °" + to;
    document.getElementById('explain').innerHTML = "Перевод температуры";
}

function calcLoan(){
    let P = parseFloat(document.getElementById('loan').value) || 0;
    let r = parseFloat(document.getElementById('rate').value)/100/12;
    let n = parseFloat(document.getElementById('months').value) || 1;
    let payment = P * r * Math.pow(1+r, n) / (Math.pow(1+r, n) - 1);
    document.getElementById('fout').innerHTML = payment.toFixed(2) + " ₽/мес";
    document.getElementById('fexp').innerHTML = "Ежемесячный платёж по кредиту";
}

function calcIncome(){
    let sum = parseFloat(document.getElementById('sum').value) || 0;
    let rate = parseFloat(document.getElementById('prate').value)/100;
    let years = parseFloat(document.getElementById('ptime').value) || 1;
    let income = sum * rate * years;
    document.getElementById('fout').innerHTML = income.toFixed(0) + " ₽";
    document.getElementById('fexp').innerHTML = `Доход за ${years} лет`;
}

function calcBMI(){
    let w = parseFloat(document.getElementById('weight').value) || 0;
    let h = parseFloat(document.getElementById('height').value)/100 || 1;
    let bmi = (w / (h * h)).toFixed(1);
    let status = bmi < 18.5 ? "Недовес" : bmi < 25 ? "Норма" : bmi < 30 ? "Избыток" : "Ожирение";
    document.getElementById('hout').innerHTML = bmi;
    document.getElementById('hexp').innerHTML = status;
}

function calcWater(){
    let w = parseFloat(document.getElementById('wweight').value) || 0;
    let water = Math.round(w * 30);
    document.getElementById('hout').innerHTML = water + " мл";
    document.getElementById('hexp').innerHTML = "Рекомендация в день";
}

let gType='mix', gMode='norm', score=0, curA, timer, time=30;

function startGame(){
    score=0; 
    document.getElementById('score').innerHTML=0; 
    show('game');
    
    if(gMode=='time'){
        time=30; 
        document.getElementById('timer').innerHTML="Осталось: "+time;
        timer = setInterval(()=>{
            time--; 
            document.getElementById('timer').innerHTML="Осталось: "+time;
            if(time<=0){ 
                clearInterval(timer); 
                alert("Время вышло! Очки: "+score); 
                show('gameMenu'); 
            }
        }, 1000);
    } else {
        document.getElementById('timer').innerHTML="";
    }
    nextQ();
}

function nextQ(){
    document.getElementById('ans').value = "";
    document.getElementById('gameHint').innerHTML = "";
    let type = (gType==='mix') ? ['currency','temp','finance','health'][Math.floor(Math.random()*4)] : gType;

    if(type === 'currency'){
        let amount = Math.floor(Math.random()*900)+100;
        let from = ['USD','EUR','RUB'][Math.floor(Math.random()*3)];
        let to = from === 'USD' ? 'RUB' : 'USD';
        document.getElementById('q').innerHTML = `${amount} ${from} = ? ${to}`;
        curA = Math.round(amount * (from==='USD'?102 : from==='EUR'?110 : 1));
    }
    else if(type === 'temp'){
        let t = Math.floor(Math.random()*40)+10;
        document.getElementById('q').innerHTML = `${t}°C = ? °F`;
        curA = Math.round(t*9/5 + 32);
    }
    else if(type === 'finance'){
        let sum = Math.floor(Math.random()*50000)+50000;
        document.getElementById('q').innerHTML = `${sum} ₽ под 12% на 1 год = ?`;
        curA = Math.round(sum * 1.12);
    }
    else if(type === 'health'){
        let w = Math.floor(Math.random()*40)+60;
        let h = Math.floor(Math.random()*30)+160;
        document.getElementById('q').innerHTML = `Вес ${w} кг, рост ${h} см → BMI?`;
        let bmi = Math.round(w / ((h/100)**2));
        curA = bmi;
    }
}

function checkGame(){
    if(parseInt(document.getElementById('ans').value) === curA){
        score++;
        document.getElementById('score').innerHTML = score;
        document.getElementById('gameHint').innerHTML = "Верно!";
        setTimeout(nextQ, 800);
    } else {
        document.getElementById('gameHint').innerHTML = `Ошибка! Правильно: ${curA}`;
        setTimeout(nextQ, 2000);
    }
}

window.onload = () => {
    show('conv');
    showSub('c1');
};
</script>
</body>
</html>
