<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Сборник Калькуляторов</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#166534,#4ade80);color:white;text-align:center;min-height:100vh}
.menu{margin-top:20px}
button{
padding:12px;margin:5px;border:none;border-radius:14px;
background:white;color:#166534;font-size:14px;font-weight:bold;
cursor:pointer;transition:0.3s
}
button:hover{transform:scale(1.08);box-shadow:0 0 15px white}
button:active{transform:scale(0.9)}
.box{
display:none;background:rgba(255,255,255,0.1);
margin:20px auto;padding:20px;border-radius:20px;
width:420px;animation:fade 0.3s;border:1px solid rgba(255,255,255,0.2)
}
@keyframes fade{from{opacity:0;transform:translateY(20px)}to{opacity:1}}
input{
width:85%;padding:10px;margin:5px 0;
font-size:16px;border:none;border-radius:10px;text-align:center;outline:none
}
.res-container{margin-top:15px;background:rgba(0,0,0,0.2);padding:15px;border-radius:15px}
.out{font-size:20px;font-weight:bold}
.sub{margin-top:10px;border-top:1px solid rgba(255,255,255,0.1);padding-top:10px}
h3{font-size:15px;margin:10px 0 5px 0;color:#eee}
.mini-btn{padding:8px;font-size:12px;background:#f0f0f0;color:#166534}
</style>
</head>
<body>

<h1>Химия</h1>

<div class="menu">
<button onclick="show('chem')">Расчёты</button>
<button onclick="show('sol')">Растворы</button>
<button onclick="show('react')">Реакции</button>
<button onclick="show('gameMenu')">Тренажёр</button>
</div>

<div id="chem" class="box">
<div style="display:flex;flex-wrap:wrap;justify-content:center">
<button class="mini-btn" onclick="showSub('c1')">Молярная масса</button>
<button class="mini-btn" onclick="showSub('c2')">Количество вещества</button>
<button class="mini-btn" onclick="showSub('c3')">Газы</button>
</div>

<div id="c1" class="sub">
<input id="mm" placeholder="H2O">
<button onclick="calcMolarMass()">Рассчитать</button>
</div>

<div id="c2" class="sub" style="display:none">
<input id="m_n" placeholder="m"><input id="M_n" placeholder="M">
<button onclick="calcAmount()">n</button>

<input id="n_m" placeholder="n"><input id="M_m" placeholder="M">
<button onclick="calcMass()">m</button>
</div>

<div id="c3" class="sub" style="display:none">
<input id="n_v" placeholder="n">
<button onclick="calcVolume()">V</button>

<input id="v_n" placeholder="V">
<button onclick="calcAmountGas()">n</button>
</div>

<div class="res-container">
<div id="out1" class="out">...</div>
</div>
</div>

<div id="sol" class="box">
<div style="display:flex;flex-wrap:wrap;justify-content:center">
<button class="mini-btn" onclick="showSub('s1')">Массовая доля</button>
<button class="mini-btn" onclick="showSub('s2')">Концентрация</button>
</div>

<div id="s1" class="sub">
<input id="mv" placeholder="m вещества">
<input id="mr" placeholder="m раствора">
<button onclick="calcMassFraction()">ω</button>
</div>

<div id="s2" class="sub" style="display:none">
<input id="n_c" placeholder="n">
<input id="v_c" placeholder="V">
<button onclick="calcMolarity()">C</button>
</div>

<div class="res-container">
<div id="out2" class="out">...</div>
</div>
</div>

<div id="react" class="box">
<input id="m_teor" placeholder="теор">
<input id="m_prakt" placeholder="практ">
<button onclick="calcYield()">η</button>

<div class="res-container">
<div id="out3" class="out">...</div>
</div>
</div>

<div id="gameMenu" class="box">
<h2>Тренажёр</h2>
<button onclick="gType='mol'">Молярная масса</button>
<button onclick="gType='amount'">Количество</button>
<button onclick="gType='solution'">Растворы</button>
<button onclick="gType='mix'">Смешанный</button>

<button onclick="gMode='norm'">Обычный</button>
<button onclick="gMode='time'">На время</button>

<button onclick="startGame()" style="width:100%;background:#166534;color:white">СТАРТ</button>
</div>

<div id="game" class="box">
<div id="timer"></div>
<p id="q"></p>
<input id="ans">
<button onclick="checkGame()">ПРОВЕРИТЬ</button>
<p>Очки: <span id="score">0</span></p>
<div id="gameHint"></div>
<button onclick="show('gameMenu')">Выйти</button>
</div>

<script>
function show(id){
document.querySelectorAll(".box").forEach(x=>x.style.display="none")
document.getElementById(id).style.display="block"
}
function showSub(id){
document.querySelectorAll(".sub").forEach(x=>x.style.display="none")
document.getElementById(id).style.display="block"
}

function calcMolarMass(){
let f=mm.value.toUpperCase()
let m=0
const a={H:1,O:16,C:12,N:14,Na:23,Cl:35.5}
let e=''
for(let i=0;i<f.length;i++){
if(/[A-Z]/.test(f[i]))e=f[i]
else if(/[a-z]/.test(f[i]))e+=f[i]
let n=''
while(i+1<f.length&&/[0-9]/.test(f[i+1]))n+=f[++i]
let c=n?parseInt(n):1
if(a[e])m+=a[e]*c
}
out1.innerHTML=m.toFixed(2)
}

function calcAmount(){
let m=parseFloat(m_n.value)||0
let M=parseFloat(M_n.value)||0
out1.innerHTML=M?(m/M).toFixed(3):"0"
}
function calcMass(){
let n=parseFloat(n_m.value)||0
let M=parseFloat(M_m.value)||0
out1.innerHTML=(n*M).toFixed(2)
}
function calcVolume(){
let n=parseFloat(n_v.value)||0
out1.innerHTML=(n*22.4).toFixed(2)
}
function calcAmountGas(){
let v=parseFloat(v_n.value)||0
out1.innerHTML=(v/22.4).toFixed(3)
}

function calcMassFraction(){
let mv=parseFloat(document.getElementById('mv').value)||0
let mr=parseFloat(document.getElementById('mr').value)||0
out2.innerHTML=mr?(mv/mr*100).toFixed(2):"0"
}
function calcMolarity(){
let n=parseFloat(n_c.value)||0
let v=parseFloat(v_c.value)||0
out2.innerHTML=v?(n/v).toFixed(2):"0"
}
function calcYield(){
let t=parseFloat(m_teor.value)||0
let p=parseFloat(m_prakt.value)||0
out3.innerHTML=t?(p/t*100).toFixed(1):"0"
}

let gType='mol',gMode='norm',score=0,curA,timer,time=30

function startGame(){
score=0;scoreEl=score;scoreEl=0
document.getElementById('score').innerHTML=0
show('game')
if(gMode==='time'){
time=30
timer=setInterval(()=>{
time--
if(time<=0){clearInterval(timer);alert(score);show('gameMenu')}
},1000)
}
nextQ()
}

function nextQ(){
ans.value=""
let t=gType
if(t==='mix')t=['mol','amount','solution'][Math.floor(Math.random()*3)]

if(t==='mol'){
q.innerHTML="H2O"
curA=18
}
if(t==='amount'){
q.innerHTML="m=100 M=100"
curA=1
}
if(t==='solution'){
q.innerHTML="10 из 100"
curA=10
}
}

function checkGame(){
if(parseFloat(ans.value)==curA){
score++
document.getElementById('score').innerHTML=score
nextQ()
}else{
nextQ()
}
}
</script>

</body>
</html>
